services:
  postgres:
    image: postgres:18
    container_name: postgres_app
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: project1
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    volumes:
      - pg_data_volume:/var/lib/postgresql
    ports:
      - "5432:5432"



volumes:
  pg_data_volume: 

